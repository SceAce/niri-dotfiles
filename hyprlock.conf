# 引入 Matugen 生成的颜色文件
source = ~/.cache/matugen/hypr/colors.conf

$font = JetBrains Maple Mono
$font_clock = JetBrains Maple Mono

general {
    hide_cursor = false
    ignore_empty_input = true
}

animations {
    enabled = true
    bezier = smooth, 0.25, 1.0, 0.5, 1.0
    animation = fadeIn, 1, 2.5, smooth
    animation = fadeOut, 1, 3.5, smooth
    animation = inputFieldDots, 1, 1.8, smooth
}

background {
    monitor =
    path = ~/.cache/.current_wallpaper
    color = rgb(16, 18, 24)
    blur_size = 7
    blur_passes = 4
    noise = 0.012
    contrast = 1.18
    brightness = 0.72
    vibrancy = 0.16
    vibrancy_darkness = 0.12
}

image {
    monitor =
    path = /home/source/SOME-FILE/puter/UID.jpg
    size = 150
    rounding = -1
    border_size = 2
    border_color = rgba(190, 205, 255, 0.28)
    shadow_passes = 3
    shadow_size = 6
    position = 0, -20%
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] echo "<b>$(date +\"%H:%M\")</b>"
    color = rgba(245, 248, 255, 0.96)
    font_size = 112
    font_family = $font_clock
    shadow_passes = 4
    shadow_size = 5
    position = 0, 24%
    halign = center
    valign = center
}

label {
    monitor =
    text = Welcome back
    color = rgba(232, 238, 252, 0.92)
    font_size = 18
    font_family = $font
    shadow_passes = 2
    shadow_size = 3
    position = 0, 29%
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %B %d')"
    color = rgba(210, 220, 240, 0.82)
    font_size = 22
    font_family = $font
    position = 0, 15%
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 11%, 46
    outline_thickness = 2
    dots_size = 0.22
    dots_spacing = 0.52
    dots_center = true
    dots_rounding = -1
    rounding = 16
    outer_color = rgba(170, 190, 255, 0.32)
    inner_color = rgba(10, 14, 20, 0.58)
    font_color = rgba(245, 248, 255, 0.96)
    check_color = rgba(194, 214, 255, 0.95)
    fail_color = rgba(255, 110, 140, 0.95)
    fade_on_empty = false
    placeholder_text = <i>Unlock</i>
    position = 0, 11%
    halign = center
    valign = bottom
}
